# goreleaser config — cross-compiles slatewave for darwin/linux/windows
# on amd64/arm64, archives the binaries with the README + LICENSE, and
# attaches everything to the GitHub release that triggered the workflow.
# Windows ships windows/amd64 only — see the `ignore` block below.
#
# Run locally with `goreleaser release --snapshot --clean` to dry-run.

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: slatewave
    main: .
    binary: slatewave
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      # Strip symbol table and DWARF (smaller binary), and bake the
      # release tag into cmd.Version so `slatewave --version` prints it.
      - -s -w -X github.com/kevinlangleyjr/slatewave-cli/cmd.Version={{ .Version }}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    # windows/arm64 is technically possible but the audience is small and
    # SmartScreen flags unsigned binaries hard. Skip until there's demand.
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: slatewave
    # zip on Windows (the platform-native expectation), tar.gz everywhere
    # else. format_overrides keys off goos.
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    # e.g. slatewave_0.0.1_darwin_arm64.tar.gz / slatewave_0.0.1_windows_amd64.zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

snapshot:
  # Used when running `--snapshot` locally without a tag.
  version_template: '{{ incpatch .Version }}-next'

release:
  draft: false
  prerelease: auto

changelog:
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - 'Apply go fmt'

# Linux distro packages — built from the same linux/amd64 + linux/arm64
# binaries the archives use, then attached to the GitHub release. End
# users grab the matching file from the Releases page and install via
# their package manager:
#
#   sudo dpkg -i slatewave_<version>_linux_amd64.deb     # Debian / Ubuntu
#   sudo rpm  -i slatewave_<version>_linux_amd64.rpm     # Fedora / RHEL / openSUSE
#   sudo apk add --allow-untrusted slatewave_<version>_linux_amd64.apk   # Alpine
#   sudo pacman -U slatewave-<version>-linux_amd64.pkg.tar.zst           # Arch
#
# These are unsigned, repo-less artifacts — good enough for "I want a
# native package on my system" without standing up an apt / yum / AUR
# repository. Add hosted repos (Cloudsmith, AUR auto-publish) later if
# install friction becomes a complaint.
nfpms:
  - id: slatewave
    package_name: slatewave
    vendor: kevinlangleyjr
    homepage: "https://getslatewave.com"
    maintainer: "Kevin Langley Jr. <me@kevinlangleyjr.dev>"
    description: "One palette across every tool you live in — install the Slatewave family from one CLI."
    license: "WTFPL"
    formats:
      - deb
      - rpm
      - apk
      - archlinux
    # Distro convention: /usr/bin for package-managed binaries.
    # /usr/local/bin is reserved for sysadmin-managed software outside
    # the package manager's purview.
    bindir: /usr/bin
    section: utils
    priority: optional
    contents:
      - src: LICENSE
        dst: /usr/share/doc/slatewave/LICENSE
      - src: README.md
        dst: /usr/share/doc/slatewave/README.md

# Homebrew tap — each release auto-publishes a formula commit to
# kevinlangleyjr/homebrew-slatewave. End users then run:
#
#   brew tap kevinlangleyjr/slatewave
#   brew install slatewave
#
# Requires a HOMEBREW_TAP_GITHUB_TOKEN repo secret (classic PAT with
# `repo` scope, or a fine-grained token scoped to the tap repo) so
# goreleaser can push the formula commit. The default GITHUB_TOKEN
# only has write access to slatewave-cli itself, not to the tap.
#
# Skip stable-release publishing on prereleases — the `auto` policy
# lets goreleaser publish the formula only for non-prerelease tags
# (so `v0.1.0-rc1` won't update the formula in the tap).
brews:
  - name: slatewave
    homepage: "https://getslatewave.com"
    description: "One palette across every tool you live in — install the Slatewave family from one CLI."
    license: "WTFPL"
    skip_upload: auto
    repository:
      owner: kevinlangleyjr
      name: homebrew-slatewave
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: kevinlangleyjr
      email: me@kevinlangleyjr.dev
    commit_msg_template: "slatewave {{ .Tag }}"
    install: |
      bin.install "slatewave"
    test: |
      assert_match "slatewave version", shell_output("#{bin}/slatewave --version")
