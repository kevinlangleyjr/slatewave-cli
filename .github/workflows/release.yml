name: release

# Fires when a tag matching v* is pushed (e.g., v0.0.1). goreleaser then
# cross-compiles, archives, checksums, and attaches the artifacts to the
# corresponding GitHub release. Tag → release in a single push.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # goreleaser needs this to create the release + upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history is required for goreleaser's changelog

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          # Default token — used to create the GitHub release on
          # slatewave-cli itself. Auto-provisioned by Actions.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cross-repo token — used to push the formula commit to
          # kevinlangleyjr/homebrew-slatewave. Provision a classic PAT
          # (or a fine-grained token scoped to the tap repo) and add
          # it to slatewave-cli's repo secrets. Without this set, the
          # release workflow still produces binaries but the brew tap
          # update is skipped (goreleaser will warn loudly).
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
