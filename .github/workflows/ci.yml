name: ci

# Runs on every push to main and on every PR.
# Two jobs: `test` (gofmt + vet + race-tests, matrixed across linux + macos)
# and `lint` (golangci-lint, linux-only — findings don't vary by OS).
# They run in parallel — a slow lint job doesn't block the test signal.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Verify go.mod / go.sum are tidy
        # Linux-only — go mod tidy results are platform-independent and
        # diff-comparing on macos would just be a redundant signal.
        if: matrix.os == 'ubuntu-latest'
        run: |
          go mod verify
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go.mod / go.sum drifted — run 'go mod tidy' locally and commit."
            exit 1
          fi

      - name: gofmt
        if: matrix.os == 'ubuntu-latest'
        run: |
          fmt_out=$(gofmt -l .)
          if [ -n "$fmt_out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$fmt_out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: tests (race detector)
        run: go test -race ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: golangci-lint
        # v8 of the action runs golangci-lint v2.x, which is built with
        # a newer Go than v1.x and can analyze projects targeting newer
        # Go directives. v1's binary (built with go1.24) used to bail
        # with "language version lower than targeted version" on this
        # repo's `go 1.24.2` directive. Repo's .golangci.yml controls
        # the errcheck exclude list (fmt.Fprint* in stdout-style writers).
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
