[theme]
slug = "windows-terminal"
name = "Slatewave for Windows Terminal"
category = "terminal"
# Windows Terminal is Windows-only — declaring supported_os removes
# this manifest from `slatewave list` / `browse` / completion on
# darwin and linux, so non-Windows users don't see a theme they
# can't install.
supported_os = ["windows"]
# `where wt` is the cmd.exe equivalent of `command -v` — exits 0 if
# the binary resolves on PATH, non-zero otherwise.
detect_command = "where wt"

[install]
type = "manual"
instructions = [
  "Open Windows Terminal → ▾ dropdown → Settings → \"Open JSON file\"",
  "Fetch the scheme JSON from:",
  "    https://raw.githubusercontent.com/kevinlangleyjr/windows-terminal-slatewave/main/slatewave.json",
  "Copy the schemes[0] object into your settings.json `schemes` array",
  "Set \"colorScheme\": \"Slatewave\" under profiles.defaults",
  "Save — Windows Terminal reloads live, no restart needed",
]

[activate]
type = "none"
