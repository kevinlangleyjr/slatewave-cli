[theme]
slug = "bat"
name = "Slatewave for bat"
category = "terminal"
detect_command = "bat --version"

[install]
type = "curl"
url = "https://raw.githubusercontent.com/kevinlangleyjr/bat-slatewave/main/Slatewave.tmTheme"
dest = "$HOME/.config/bat/themes/Slatewave.tmTheme"

[install.post]
description = "Rebuilding bat theme cache"
command = "bat cache --build"

[activate]
# bat reads $HOME/.config/bat/config on every invocation and treats
# each line as a CLI flag. Writing --theme there is more reliable
# (and per-shell-agnostic) than exporting BAT_THEME in a shell rc.
type = "shell-rc"
files = ["~/.config/bat/config"]
line = '--theme="Slatewave"'

[verify]
command = "bat --list-themes"
expect = "Slatewave"
