[theme]
slug = "vscodium"
name = "Slatewave for VSCodium"
category = "editor"
# VSCodium is the FLOSS rebuild of VSCode — same VSIX format, same
# `--install-extension` flag, but the Microsoft Marketplace is stripped
# out so the editor talks to Open VSX (open-vsx.org) instead. Cross-
# platform.
supported_os = ["darwin", "linux", "windows"]
detect_command = "codium --version"

[install]
# `cli = "codium"` points the vscode-ext handler at the VSCodium binary
# rather than the default `code`. The package is published to Open VSX
# at https://open-vsx.org/extension/kevinlangleyjr/slatewave, which is
# where VSCodium reads from by default (it intentionally does NOT fall
# back to the Microsoft Marketplace).
type = "vscode-ext"
cli = "codium"
identifier = "kevinlangleyjr.slatewave"

[activate]
type = "none"

[verify]
command = "codium --list-extensions"
expect = "slatewave"
