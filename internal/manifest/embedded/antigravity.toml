[theme]
slug = "antigravity"
name = "Slatewave for Antigravity"
category = "editor"
# Antigravity is Google's agentic AI IDE (announced November 2025),
# built on a VSCode fork. Same VSIX extension format and the same
# `--install-extension` flag, with Open VSX as the default gallery.
# Cross-platform — macOS, Linux, Windows binaries from antigravity.google.
supported_os = ["darwin", "linux", "windows"]
detect_command = "antigravity --version"

[install]
# `cli = "antigravity"` points the vscode-ext handler at the Antigravity
# binary. Like VSCodium, Antigravity reads from Open VSX rather than
# Microsoft's marketplace — the package is published at
# https://open-vsx.org/extension/kevinlangleyjr/slatewave so the install
# resolves directly with no marketplace switching required.
type = "vscode-ext"
cli = "antigravity"
identifier = "kevinlangleyjr.slatewave"

[activate]
type = "none"

[verify]
command = "antigravity --list-extensions"
expect = "slatewave"
