[theme]
slug = "obsidian"
name = "Slatewave for Obsidian"
category = "notes"
# Cover the three common install shapes:
#   - macOS .app       — /Applications/Obsidian.app
#   - Linux deb / snap — `obsidian` on $PATH
#   - Linux Flatpak    — md.obsidian.Obsidian in `flatpak list`
# AppImage users without $PATH symlinking will fall through; they can
# alias `obsidian` to the AppImage path to be detected.
detect_command = "command -v obsidian || test -d /Applications/Obsidian.app || flatpak list 2>/dev/null | grep -q md.obsidian.Obsidian"

[install]
# Obsidian themes live inside a vault's .obsidian/themes/ directory —
# the CLI doesn't know which vault the user wants. Clone the repo to
# a known scratch location and let the user copy/symlink it into the
# right vault themselves.
#
# Slatewave is also published to the Obsidian Community Themes catalog
# (https://community.obsidian.md/themes/slatewave) — users who don't
# need CLI-managed updates/uninstall can install directly from
# Settings → Appearance → Themes → Manage inside Obsidian instead.
type = "clone"
repo = "https://github.com/kevinlangleyjr/obsidian-slatewave.git"
clone_dest = "$HOME/.local/share/obsidian-slatewave"
instructions = [
  "Link the theme files into your vault's themes directory:",
  "    mkdir -p <vault>/.obsidian/themes/Slatewave",
  "    ln -s ~/.local/share/obsidian-slatewave/theme.css <vault>/.obsidian/themes/Slatewave/theme.css",
  "    ln -s ~/.local/share/obsidian-slatewave/manifest.json <vault>/.obsidian/themes/Slatewave/manifest.json",
  "In Obsidian, open Settings → Appearance → Themes → select Slatewave",
  "",
  "Prefer Obsidian-managed updates? Slatewave is also in the Community",
  "Themes catalog: Settings → Appearance → Themes → Manage → search",
  "\"Slatewave\". (https://community.obsidian.md/themes/slatewave)",
]

[activate]
type = "none"

[verify]
command = "test -d $HOME/.local/share/obsidian-slatewave"

[uninstall]
done_message = "Reverted. Restart Obsidian if it's open — the theme is loaded once at launch."
