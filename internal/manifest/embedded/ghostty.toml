[theme]
slug = "ghostty"
name = "Slatewave for Ghostty"
category = "terminal"
# `command -v ghostty` only succeeds when the CLI is on $PATH. On a
# stock macOS install Ghostty is dragged to /Applications and the CLI
# isn't symlinked anywhere — fall through to the .app bundle check.
detect_command = "command -v ghostty || test -d /Applications/Ghostty.app"

[install]
type = "curl"
url = "https://raw.githubusercontent.com/kevinlangleyjr/ghostty-slatewave/main/Slatewave"
dest = "$HOME/.config/ghostty/themes/Slatewave"

[activate]
type = "ini-key"
file = "$HOME/.config/ghostty/config"
key = "theme"
value = "Slatewave"

[verify]
command = "grep '^theme' ~/.config/ghostty/config"
expect = "Slatewave"
