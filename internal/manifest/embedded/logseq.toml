[theme]
slug = "logseq"
name = "Slatewave for Logseq"
category = "notes"
# Cover the three common install shapes:
#   - macOS .app    — /Applications/Logseq.app
#   - Linux deb     — `logseq` on $PATH
#   - Linux Flatpak — com.logseq.Logseq in `flatpak list`
detect_command = "command -v logseq || test -d /Applications/Logseq.app || flatpak list 2>/dev/null | grep -q com.logseq.Logseq"

[install]
# Logseq Marketplace theme listing is pending — load as an unpacked
# plugin via the Logseq UI in the meantime.
type = "clone"
repo = "https://github.com/kevinlangleyjr/logseq-slatewave.git"
clone_dest = "$HOME/.local/share/logseq-slatewave"
instructions = [
  "In Logseq, open ⋯ → Plugins → Load unpacked plugin",
  "Pick the cloned ~/.local/share/logseq-slatewave directory",
  "Open Settings → Themes → select Slatewave Dark",
]

[activate]
type = "none"

[verify]
command = "test -d $HOME/.local/share/logseq-slatewave"

[uninstall]
done_message = "Reverted. Restart Logseq if it's open — the theme is loaded once at launch."
