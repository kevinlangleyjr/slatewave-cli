[theme]
slug = "slack"
name = "Slatewave for Slack"
category = "chat"
# Cover the three common install shapes:
#   - macOS .app           — /Applications/Slack.app
#   - Linux deb / snap     — `slack` on $PATH
#   - Linux Flatpak        — com.slack.Slack in `flatpak list`
detect_command = "command -v slack || test -d /Applications/Slack.app || flatpak list 2>/dev/null | grep -q com.slack.Slack"

[install]
# Slack's only theme-import affordance is a pasted comma-separated hex
# string. Print the string and the steps; user pastes into Preferences.
type = "manual"
instructions = [
  "In Slack, open Preferences → Themes",
  "Set the base appearance to Dark",
  "Scroll to Colors → Create a custom theme",
  "Paste this string as the custom theme:",
  "    #1E293B,#282C34,#334155,#5EEAD4,#282C34,#E2E8F0,#5EEAD4,#FB7185",
  "Slack applies immediately; close the dialog to keep it",
]

[activate]
type = "none"
