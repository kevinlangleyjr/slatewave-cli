[theme]
slug = "lsd"
name = "Slatewave for LSD"
category = "terminal"
detect_command = "lsd --version"

[install]
type = "curl"
url = "https://raw.githubusercontent.com/kevinlangleyjr/lsd-slatewave/main/colors.yaml"
dest = "$HOME/.config/lsd/colors.yaml"

[activate]
# lsd's `colors.yaml` is loaded only when ~/.config/lsd/config.yaml has
#   color:
#     when: auto
#     theme: custom
# yaml-set drops these two keys under `color:` while preserving the
# user's other top-level keys and comments.
type = "yaml-set"
yaml_path = "$HOME/.config/lsd/config.yaml"

[[activate.yaml_set]]
path = "color.when"
value = "auto"

[[activate.yaml_set]]
path = "color.theme"
value = "custom"

[verify]
command = "test -f $HOME/.config/lsd/colors.yaml"
