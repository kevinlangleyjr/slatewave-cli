[theme]
slug = "oh-my-posh"
name = "Slatewave for Oh My Posh"
category = "terminal"
detect_command = "oh-my-posh --version"

[install]
type = "curl"
url = "https://raw.githubusercontent.com/kevinlangleyjr/slatewave-omp/main/slatewave.omp.json"
dest = "$HOME/.config/oh-my-posh/slatewave.omp.json"

[activate]
type = "shell-rc"
files = ["~/.zshrc", "~/.bashrc"]
line = "eval \"$(oh-my-posh init zsh --config ~/.config/oh-my-posh/slatewave.omp.json)\""

[verify]
command = "test -f ~/.config/oh-my-posh/slatewave.omp.json"
