[theme]
slug = "jetbrains"
name = "Slatewave for JetBrains"
category = "editor"
# JetBrains plugins install via the Marketplace inside any JetBrains
# IDE. There's no headless CLI install path, so detection is "any
# JetBrains IDE present in /Applications".
detect_command = "ls /Applications | grep -E '(GoLand|IntelliJ|WebStorm|PyCharm|RubyMine|PhpStorm|CLion|RustRover|DataGrip|Rider|Android Studio)'"

[install]
type = "marketplace"
url = "https://plugins.jetbrains.com/plugin/31459-slatewave"
instructions = [
  "Browser opens the Marketplace page",
  "Click Install — your IDE will fetch and apply the plugin",
  "Then Settings → Appearance & Behavior → Appearance → Theme → Slatewave",
]

[activate]
type = "none"

[verify]
# JetBrains drops marketplace-installed plugins into <config>/plugins/.
# Look in both the macOS and Linux locations and across any IDE versions
# the user has installed. The plugin's on-disk dir name varies by IDE
# version + install method, so we case-insensitively glob for anything
# slatewave-named under any plugins/ folder. Find errors when a search
# path doesn't exist, so 2>/dev/null swallows that case.
command = "find \"$HOME/Library/Application Support/JetBrains\" \"$HOME/.config/JetBrains\" -type d -iname '*slatewave*' 2>/dev/null | grep -q ."
