[theme]
slug = "alfred"
name = "Slatewave for Alfred"
category = "productivity"
detect_command = "test -d /Applications/Alfred.app -o -d /Applications/Alfred\\ 5.app"

[install]
type = "gui-import"
url = "https://raw.githubusercontent.com/kevinlangleyjr/alfred-slatewave/main/Slatewave.alfredappearance"
dest = "$HOME/Downloads/Slatewave.alfredappearance"
instructions = [
  "Alfred opens with the Appearance pane and Slatewave pre-selected",
  "Click Import to confirm — it'll appear in your theme list",
]

[activate]
type = "none"

[verify]
# The .alfredappearance file we drop in ~/Downloads is just a transient
# handoff — Alfred copies it into its own preferences package on import,
# under ~/Library/Application Support/Alfred/Alfred.alfredpreferences/themes/
# theme.fileimport.<UUID>/theme.json. Each theme.json carries the
# original "name" : "Slatewave" field, so grep against the glob across
# every imported theme. This survives the user later cleaning Downloads
# (a previous bug — verify would falsely flag stale).
#
# 2>/dev/null swallows the no-such-file error if the user has Alfred
# installed but no themes imported yet (the glob expands to literal
# `*/theme.json` and grep errors). Exit non-zero in that case is
# correct — it means our theme isn't imported.
command = "grep -q '\"name\" : \"Slatewave\"' \"$HOME/Library/Application Support/Alfred/Alfred.alfredpreferences/themes/\"*/theme.json 2>/dev/null"
